name: Run Happ Extractor Bot

on:
  workflow_dispatch: # Запуск кнопкой
  schedule:
    - cron: '*/300 * * * *' # Перезапуск каждые 5 часов (чтобы не умереть по таймауту)
  push:
    branches: [ main ] # Запуск при обновлении кода

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pyTelegramBotAPI requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
