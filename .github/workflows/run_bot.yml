name: Run Happ Extractor Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI requests
        
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SAYORI_KEY: ${{ secrets.SAYORI_KEY }} # НЕ ЗАБУДЬ ДОБАВИТЬ ЭТОТ СЕКРЕТ
        run: python bot.py
