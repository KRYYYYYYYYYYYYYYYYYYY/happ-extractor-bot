name: Run Happ Extractor Bot

on:
  workflow_dispatch: # Запуск кнопкой в Actions
  schedule:
    - cron: '0 */5 * * *' # Перезапуск каждые 5 часов
  push:
    branches: [ main ] # Запуск при сохранении кода

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
